name: Edwin
options:
  bundleIdPrefix: com.flowjam
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

targets:
  Edwin:
    type: application
    platform: iOS
    sources:
      - Edwin
    dependencies:
      - target: NotificationService
        embed: true
    entitlements:
      path: Edwin/Edwin.entitlements
      properties:
        com.apple.developer.applesignin: [Default]
        aps-environment: production
        # com.apple.developer.usernotifications.communication: true
        # ^ re-enable once the capability is ticked on the app id in the
        #   developer portal (API can't set it) and the profile is regenerated
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.flowjam.iris
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: Z3FSAXK2G4
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_ENTITLEMENTS: Edwin/Edwin.entitlements
        PROVISIONING_PROFILE_SPECIFIER: "Iris App Store"
        CODE_SIGN_IDENTITY: "Apple Distribution"
        TARGETED_DEVICE_FAMILY: "1"
        "TARGETED_DEVICE_FAMILY[sdk=macosx*]": "2"
        SUPPORTS_MACCATALYST: YES
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: NO
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: Edwin
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: false
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Edwin uses the mic so you can send him voice memos."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "Voice memos are transcribed on your device before being sent to Edwin."
        INFOPLIST_KEY_NSCalendarsUsageDescription: "Edwin reads your calendar to know when you're free and flag scheduling in your messages."
        INFOPLIST_KEY_NSCalendarsFullAccessUsageDescription: "Edwin reads your calendar to know when you're free and flag scheduling in your messages."

  NotificationService:
    type: app-extension
    platform: iOS
    sources:
      - NotificationService
    info:
      path: NotificationService/Info.plist
      properties:
        CFBundleDisplayName: Edwin Notification Service
        NSExtension:
          NSExtensionPointIdentifier: com.apple.usernotifications.service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).NotificationService
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.flowjam.iris.NotificationService
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: Z3FSAXK2G4
        CODE_SIGN_STYLE: Manual
        PROVISIONING_PROFILE_SPECIFIER: "Iris NSE App Store"
        CODE_SIGN_IDENTITY: "Apple Distribution"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        "TARGETED_DEVICE_FAMILY[sdk=macosx*]": "2"
        SUPPORTS_MACCATALYST: YES
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: NO
        SKIP_INSTALL: true
