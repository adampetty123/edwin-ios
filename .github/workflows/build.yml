name: Build and TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          ls -d /Applications/Xcode*.app || true
          LATEST=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$LATEST" ]; then sudo xcode-select -s "$LATEST"; fi
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Bump build number
        run: |
          # epoch seconds — strictly increasing, can never collide with other pipelines
          # (EAS autoIncrement grabbed 150-172 on this app record and silently ate uploads)
          BUILD_NUM=$(date +%s)
          sed -i '' "s/CURRENT_PROJECT_VERSION: \"1\"/CURRENT_PROJECT_VERSION: \"$BUILD_NUM\"/" project.yml
          echo "build number: $BUILD_NUM"

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Import signing certificate
        env:
          P12_B64: ${{ secrets.DIST_P12_B64 }}
          P12_PASSWORD: ${{ secrets.DIST_P12_PASSWORD }}
        run: |
          KEYCHAIN=build.keychain
          KEYCHAIN_PASS=ci-temp-pass
          echo "$P12_B64" | base64 --decode > dist.p12
          security create-keychain -p "$KEYCHAIN_PASS" $KEYCHAIN
          security default-keychain -s $KEYCHAIN
          security unlock-keychain -p "$KEYCHAIN_PASS" $KEYCHAIN
          security set-keychain-settings -t 3600 -u $KEYCHAIN
          security import dist.p12 -k $KEYCHAIN -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASS" $KEYCHAIN
          rm dist.p12

      - name: Install provisioning profiles
        env:
          PROFILE_B64: ${{ secrets.PROVISIONING_PROFILE_B64 }}
          PROFILE_NSE_B64: ${{ secrets.PROFILE_NSE_B64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          for var in PROFILE_B64 PROFILE_NSE_B64; do
            echo "${!var}" | base64 --decode > profile.mobileprovision
            UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' /dev/stdin <<< "$(security cms -D -i profile.mobileprovision)")
            cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
            echo "installed $var as $UUID"
          done

      - name: Archive
        run: |
          set -o pipefail
          xcodebuild archive \
            -project Edwin.xcodeproj \
            -scheme Edwin \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/Edwin.xcarchive \
            CODE_SIGN_STYLE=Manual \
            | tail -50

      - name: Export IPA
        run: |
          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath build/Edwin.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/export \
            | tail -20
          ls -la build/export

      - name: Verify signed entitlements
        run: |
          cd build/export
          unzip -q *.ipa -d ipa-check
          echo "=== entitlements in signed app ==="
          codesign -d --entitlements :- ipa-check/Payload/*.app
          codesign -d --entitlements :- ipa-check/Payload/*.app 2>/dev/null | grep -q applesignin \
            && echo "OK: applesignin entitlement present" \
            || { echo "FAIL: applesignin entitlement MISSING"; exit 1; }
          codesign -d --entitlements :- ipa-check/Payload/*.app 2>/dev/null | grep -q aps-environment \
            && echo "OK: aps-environment entitlement present" \
            || { echo "FAIL: aps-environment entitlement MISSING"; exit 1; }
          rm -rf ipa-check

      - name: Upload to TestFlight
        env:
          ASC_KEY_B64: ${{ secrets.ASC_API_KEY_B64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_KEY_B64" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_$ASC_KEY_ID.p8
          xcrun altool --upload-app -f build/export/*.ipa -t ios \
            --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID"

  # Mac Catalyst compile check — proves the app builds for macOS without
  # burning a TestFlight upload. Signing + upload lane comes once green.
  mac-catalyst-check:
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 26
        run: |
          LATEST=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$LATEST" ]; then sudo xcode-select -s "$LATEST"; fi
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate
      - name: Build for Mac Catalyst (unsigned)
        run: |
          set -o pipefail
          xcodebuild build \
            -project Edwin.xcodeproj \
            -scheme Edwin \
            -destination 'generic/platform=macOS,variant=Mac Catalyst' \
            CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY="" \
            | tail -30
